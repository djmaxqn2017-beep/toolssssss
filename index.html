<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src * data: gap: blob:; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; img-src * data: content: blob:; media-src *; connect-src *;">
    <title>Tool AI Tài Xỉu</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #07140b; color: #fff; text-align: center; padding: 12px; margin: 0; }
        .wrapper { max-width: 520px; margin: 12px auto; background: #0d2212; padding: 18px; border-radius: 18px; box-shadow: 0 8px 32px rgba(0,0,0,0.65); border: 1px solid #1d7a35; }
        h2 { color: #74ff8d; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 4px 0; }
        .sub { color: #9cd4a6; font-size: 12px; margin-bottom: 12px; }
        .status-online { color: #74ff8d; font-weight: bold; font-size: 12px; border: 1px solid #74ff8d; display: inline-block; padding: 3px 10px; border-radius: 12px; margin-bottom: 12px; }
        .status-offline { color: #ff4466; font-weight: bold; font-size: 12px; border: 1px solid #ff4466; display: none; padding: 3px 10px; border-radius: 12px; margin-bottom: 12px; }
        label { display: block; text-align: left; margin-left: 2%; font-size: 13px; color: #a8c9ad; }
        input { width: 100%; padding: 14px; margin: 7px 0 12px 0; border: 1px solid #216d34; background: #101d13; color: #fff; border-radius: 10px; text-align: center; font-size: 17px; outline: none; }
        button { border: none; color: #fff; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .main-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #1c9f3e, #74ff8d); font-size: 17px; box-shadow: 0 4px 15px rgba(116,255,141,0.22); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 0 12px; }
        .quick { padding: 13px 0; background: #31a84b; font-size: 16px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .small-btn { padding: 12px; background: #27783a; font-size: 15px; }
        .danger { background: #7c2b35; }
        .brain-box { margin-top: 16px; padding: 15px; background: #101d13; border-radius: 12px; border: 1px solid #216d34; }
        #result { font-size: 38px; color: #ffcc00; margin: 10px 0 3px; font-weight: bold; }
        #percent { font-size: 17px; color: #74ff8d; font-weight: bold; }
        .server-status { color: #8fb896; font-size: 12px; margin-top: 10px; line-height: 1.4; }
        .section { margin-top: 12px; padding: 12px; background: #0b3216; border: 1px solid #1d7a35; border-radius: 12px; text-align: left; }
        .section h3 { margin: 0 0 10px; font-size: 15px; color: #ffffff; }
        .bar-wrap { margin-bottom: 9px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
        .bar-bg { height: 7px; background: #123d1d; border-radius: 20px; overflow: hidden; }
        .bar { height: 100%; background: #74ff8d; width: 0%; }
        .mini-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 7px; }
        .mini-card { background: #123d1d; border-radius: 8px; padding: 7px; text-align: center; font-size: 12px; }
        .history { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 8px; }
        .pill { padding: 5px 8px; border-radius: 20px; font-size: 12px; font-weight: bold; background: #1c9f3e; }
        .pill.xiu { background: #2755b8; }
        .muted { color: #9cd4a6; }
    </style>
</head>
<body>
<div class="wrapper">
    <h2>AI TÀI XỈU CLOUD</h2>
    <div class="sub">Nhập tổng 3 xúc xắc - Server AI phân tích BigData</div>
    <div id="tag-online" class="status-online" style="display:none">● ĐÃ KẾT NỐI SERVER AI</div>
    <div id="tag-offline" class="status-offline" style="display:inline-block">ĐANG KẾT NỐI SERVER...</div>

    <div id="main-form">
        <label for="server_url" style="display:none">Địa chỉ Server:</label>
        <input type="hidden" id="server_url" placeholder="http://IP_MAY_TINH:3001" value="">

        <label for="total_input">Tổng 3 xúc xắc vừa ra:</label>
        <input type="text" id="total_input" inputmode="numeric" maxlength="3" placeholder="Nhập tổng 3-18 hoặc 3 mặt VD: 312">

        <div class="grid" id="quick-grid"></div>
        <button class="main-btn" id="send_btn" onclick="sendDataToServerAI()" disabled>ĐANG KẾT NỐI SERVER...</button>
        <div class="row">
            <button class="small-btn" onclick="backOne()">↩ BACK</button>
            <button class="small-btn danger" onclick="newTable()">🔄 Đổi bàn</button>
        </div>
    </div>

    <div class="brain-box">
        <div class="muted">KẾT QUẢ TỪ SERVER AI:</div>
        <div id="result">CHỜ DỮ LIỆU...</div>
        <div id="percent">Tài: 0% | Xỉu: 0%</div>
        <div id="accuracy">Độ đúng máy này: 0.0%</div>
        <div class="server-status" id="server_info">Trạng thái: Đang đợi lệnh Fetch API...</div>
        <div class="history" id="history"></div>
    </div>

    <div class="section">
        <h3>Tài / Xỉu</h3>
        <div id="tx-bars"></div>
    </div>

    <div class="section">
        <h3>Tổng 4–17</h3>
        <div class="mini-grid" id="total-bars"></div>
    </div>

    <div class="section">
        <h3>Mặt xúc xắc / Đôi / Bộ ba</h3>
        <div class="mini-grid" id="dice-bars"></div>
    </div>
</div>

<script>
    const deviceIdKey = "TAIXIU_DEVICE_ID";
    let deviceId = localStorage.getItem(deviceIdKey);
    if (!deviceId) {
        deviceId = "TX_" + Math.random().toString(36).slice(2, 10).toUpperCase() + "_" + Date.now();
        localStorage.setItem(deviceIdKey, deviceId);
    }

    const historyLocal = [];
    const quickGrid = document.getElementById("quick-grid");
    for (let i = 3; i <= 18; i++) {
        const btn = document.createElement("button");
        btn.className = "quick";
        btn.innerText = i;
        btn.onclick = () => { document.getElementById("total_input").value = i; sendDataToServerAI(); };
        quickGrid.appendChild(btn);
    }

    setInterval(() => {
        if (!navigator.onLine) {
            document.getElementById("tag-online").style.display = "none";
            document.getElementById("tag-offline").style.display = "inline-block";
            document.getElementById("main-form").style.pointerEvents = "none";
            document.getElementById("main-form").style.opacity = "0.35";
            document.getElementById("result").innerText = "MẤT KẾT NỐI";
            document.getElementById("result").style.color = "#ff4466";
        } else {
            document.getElementById("main-form").style.pointerEvents = "auto";
            document.getElementById("main-form").style.opacity = "1";
        }
    }, 1000);

    const CONFIG_URL = "https://djmaxqn2017-beep.github.io/toolssssss/config.json";
    let SERVER_URL = "";

    async function loadServerConfig(retry = 2) {
        const sendBtn = document.getElementById("send_btn");
        if (sendBtn) {
            sendBtn.disabled = true;
            sendBtn.innerText = "ĐANG KẾT NỐI SERVER...";
        }

        document.getElementById("result").innerText = "ĐANG KẾT NỐI...";
        document.getElementById("result").style.color = "#ffcc00";
        document.getElementById("server_info").innerText = "Đang đọc config từ GitHub Pages...";

        for (let attempt = 0; attempt <= retry; attempt++) {
            try {
                const response = await fetch(CONFIG_URL + "?t=" + Date.now(), { cache: "no-store" });
                if (!response.ok) throw new Error("Không tải được config.json");
                const cfg = await response.json();

                SERVER_URL = String(cfg.server || "").trim().replace(/\/$/, "");
                if (!SERVER_URL.startsWith("https://")) {
                    throw new Error("URL server trong config.json phải bắt đầu bằng https://");
                }

                // Kiểm tra server thật sự còn sống
                const statusRes = await fetch(SERVER_URL + "/api/status?t=" + Date.now(), { cache: "no-store" });
                if (!statusRes.ok) throw new Error("Server không phản hồi /api/status");
                const statusJson = await statusRes.json();
                if (!statusJson.success) throw new Error("Server trả về trạng thái không hợp lệ");

                document.getElementById("tag-online").style.display = "inline-block";
                document.getElementById("tag-offline").style.display = "none";
                document.getElementById("main-form").style.pointerEvents = "auto";
                document.getElementById("main-form").style.opacity = "1";
                document.getElementById("result").innerText = "CHỜ DỮ LIỆU...";
                document.getElementById("result").style.color = "#ffcc00";
                document.getElementById("server_info").innerText = "Đã kết nối server: " + SERVER_URL;

                if (sendBtn) {
                    sendBtn.disabled = false;
                    sendBtn.innerText = "GỬI DATA & NHẬN GỢI Ý";
                }
                return true;
            } catch (e) {
                if (attempt < retry) {
                    document.getElementById("server_info").innerText = "Kết nối lỗi, đang thử lại lần " + (attempt + 1) + "...";
                    await new Promise(resolve => setTimeout(resolve, 1200));
                    continue;
                }

                document.getElementById("tag-online").style.display = "none";
                document.getElementById("tag-offline").style.display = "inline-block";
                document.getElementById("main-form").style.pointerEvents = "auto";
                document.getElementById("main-form").style.opacity = "1";
                document.getElementById("result").innerText = "SERVER OFFLINE";
                document.getElementById("result").style.color = "#ff4466";
                document.getElementById("server_info").innerText =
                    "Không kết nối được server. Kiểm tra cloudflared, node server.js hoặc config.json. Lỗi: " + e.message;

                if (sendBtn) {
                    sendBtn.disabled = false;
                    sendBtn.innerText = "THỬ KẾT NỐI LẠI";
                }
                return false;
            }
        }
    }

    function apiUrl(path) {
        return SERVER_URL.replace(/\/$/, "") + path;
    }

    function fetchWithTimeout(url, options = {}, timeoutMs = 10000) {
        return Promise.race([
            fetch(url, options),
            new Promise((_, reject) => setTimeout(() => reject(new Error("Kết nối quá thời gian")), timeoutMs))
        ]);
    }

    
    window.addEventListener("error", function(e) {
        document.getElementById("tag-online").style.display = "none";
        document.getElementById("tag-offline").style.display = "inline-block";
        document.getElementById("tag-offline").innerText = "LỖI JAVASCRIPT";
        document.getElementById("result").innerText = "LỖI JS";
        document.getElementById("result").style.color = "#ff4466";
        document.getElementById("server_info").innerText = "Lỗi JS: " + e.message;
    });

    window.addEventListener("load", function() {
        document.getElementById("server_info").innerText = "JavaScript đã chạy. Đang kiểm tra server...";
        loadServerConfig();
    });


    function normalizePercent(v) {
        const n = Number(v);
        return Number.isFinite(n) ? Math.max(0, Math.min(100, n)) : 0;
    }

    function makeBar(name, pct) {
        pct = normalizePercent(pct);
        return `<div class="bar-wrap"><div class="bar-label"><span>${name}</span><b>${pct.toFixed(2)}%</b></div><div class="bar-bg"><div class="bar" style="width:${pct}%"></div></div></div>`;
    }

    function makeMini(name, pct) {
        pct = normalizePercent(pct);
        return `<div class="mini-card"><b>${name}</b><br>${pct.toFixed(2)}%<div class="bar-bg" style="margin-top:5px"><div class="bar" style="width:${pct}%"></div></div></div>`;
    }

    function updateHistory(total) {
        if (total) historyLocal.push(Number(total));
        const box = document.getElementById("history");
        box.innerHTML = historyLocal.slice(-20).map(t => {
            const cls = t >= 11 ? "pill" : "pill xiu";
            return `<span class="${cls}">${t} ${t >= 11 ? "T" : "X"}</span>`;
        }).join("");
    }

    function updateUI(data, total) {
        const pred = data.ket_qua_du_doan || data.prediction || "CHỜ";
        const tai = normalizePercent(data.phan_tram_tai ?? data.tai_percent ?? data.phan_tram_con ?? 0);
        const xiu = normalizePercent(data.phan_tram_xiu ?? data.xiu_percent ?? data.phan_tram_cai ?? 0);

        document.getElementById("result").innerText = pred;
        document.getElementById("result").style.color = String(pred).includes("TÀI") ? "#ff4466" : "#74ff8d";
        document.getElementById("percent").innerText = `Tài: ${tai.toFixed(2)}% | Xỉu: ${xiu.toFixed(2)}%`;

        const acc = data.accuracy_may_nay?.rate ?? data.do_chinh_xac ?? data.do_tin_cay ?? 0;
        document.getElementById("accuracy").innerText = "Độ đúng máy này: " + normalizePercent(acc).toFixed(2) + "%";
        document.getElementById("server_info").innerText = data.xu_huong_text || data.panel_text || ("BigData: " + (data.tong_mau_du_lieu || 0) + " mẫu");

        document.getElementById("tx-bars").innerHTML = makeBar("TÀI", tai) + makeBar("XỈU", xiu);

        const totalStats = data.phan_tram_tong_4_17 || data.phan_tram_tong || data.total_percent || data.tong_4_17 || {};
        let totalHtml = "";
        for (let i = 4; i <= 17; i++) totalHtml += makeMini("Tổng " + i, totalStats[i] ?? totalStats[String(i)] ?? 0);
        document.getElementById("total-bars").innerHTML = totalHtml;

        const diceStats = data.phan_tram_mat_xuc_xac || data.dice_percent || data.xuc_xac || {};
        const doubleStats = data.phan_tram_doi || data.double_percent || data.doi || {};
        const tripleStats = data.phan_tram_bo_ba || data.triple_percent || data.bo_ba || {};
        let diceHtml = "";
        for (let i = 1; i <= 6; i++) diceHtml += makeMini("Mặt " + i, diceStats[i] ?? diceStats[String(i)] ?? 0);
        for (let i = 1; i <= 6; i++) diceHtml += makeMini("Đôi " + i, doubleStats[i] ?? doubleStats[String(i)] ?? 0);
        for (let i = 1; i <= 6; i++) diceHtml += makeMini("Bộ ba " + i, tripleStats[i] ?? tripleStats[String(i)] ?? 0);
        document.getElementById("dice-bars").innerHTML = diceHtml;

        updateHistory(total);
    }

    function parseInputValue() {
        const raw = String(document.getElementById("total_input").value || "").trim();

        // Cho phép nhập 3 mặt xúc xắc dạng 312 = 3 + 1 + 2 = 6
        if (/^[1-6]{3}$/.test(raw)) {
            const total = raw.split("").reduce((s, x) => s + Number(x), 0);
            return { ok: true, total, note: `Đã hiểu ${raw} = ${raw[0]} + ${raw[1]} + ${raw[2]} = ${total}` };
        }

        // Cho phép nhập tổng trực tiếp từ 3 đến 18
        const total = Number(raw);
        if (Number.isInteger(total) && total >= 3 && total <= 18) {
            return { ok: true, total, note: `Tổng đã nhập: ${total}` };
        }

        return { ok: false, total: null, note: "Vui lòng nhập tổng 3-18 hoặc 3 mặt xúc xắc, ví dụ 312." };
    }

    async function sendDataToServerAI() {
        if (!SERVER_URL) {
            const okConfig = await loadServerConfig();
            if (!okConfig) return;
        }
        const parsed = parseInputValue();
        if (!parsed.ok) {
            alert(parsed.note);
            return;
        }

        const total = parsed.total;
        document.getElementById("result").innerText = "ĐANG GỌI SERVER...";
        document.getElementById("result").style.color = "#ffcc00";
        document.getElementById("server_info").innerText = parsed.note + " | Đang gửi lên server...";

        fetchWithTimeout(apiUrl("/api/predict"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                device_id: deviceId,
                tong: total,
                ket_qua_truoc: total,
                tong_3_xuc_xac: total
            })
        })
        .then(response => {
            if (!response.ok) throw new Error("Server từ chối hoặc đang sập");
            return response.json();
        })
        .then(data => {
            updateUI(data, total);

            const lines = [];
            if (parsed.note) lines.push(parsed.note);
            if (data.ket_qua_van_truoc) lines.push(data.ket_qua_van_truoc);
            if (data.trang_thai_tay) lines.push(data.trang_thai_tay);
            if (data.panel_text) lines.push(data.panel_text);
            if (data.xu_huong_text) lines.push(data.xu_huong_text);

            document.getElementById("server_info").innerText = lines.join(" | ");
        })
        .catch(error => {
            SERVER_URL = "";
            document.getElementById("tag-online").style.display = "none";
            document.getElementById("tag-offline").style.display = "inline-block";
            document.getElementById("result").innerText = "SERVER AI OFF/LỖI";
            document.getElementById("result").style.color = "#ff4466";
            document.getElementById("server_info").innerText = "Lỗi kết nối: " + error.message + " | Hãy kiểm tra cloudflared hoặc sửa config.json.";
        });
    }

    async function backOne() {
        if (!SERVER_URL) {
            const okConfig = await loadServerConfig();
            if (!okConfig) return;
        }
        fetchWithTimeout(apiUrl("/api/clear"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ device_id: deviceId, action: "BACK" })
        }).then(r => r.json()).then(data => {
            historyLocal.pop();
            updateHistory();
            document.getElementById("server_info").innerText = data.message || "Đã BACK 1 ván";
        }).catch(err => alert("Lỗi BACK: " + err.message));
    }

    async function newTable() {
        if (!SERVER_URL) {
            const okConfig = await loadServerConfig();
            if (!okConfig) return;
        }
        if (!confirm("Đổi bàn mới?")) return;
        fetchWithTimeout(apiUrl("/api/clear"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ device_id: deviceId, action: "NEW_TABLE" })
        }).then(r => r.json()).then(data => {
            historyLocal.length = 0;
            updateHistory();
            document.getElementById("result").innerText = "BÀN MỚI";
            document.getElementById("server_info").innerText = data.message || "Đã đổi bàn";
        }).catch(err => alert("Lỗi đổi bàn: " + err.message));
    }

    document.getElementById("total_input").addEventListener("keydown", function(e) {
        if (e.key === "Enter") sendDataToServerAI();
    });

</script>
</body>
</html>
